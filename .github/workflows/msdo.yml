name: Microsoft Security DevOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  msdo:
    name: MSDO scan (code, IaC, secrets, containers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1
        id: msdo
        with:
          categories: 'IaC,secrets,code,artifacts,containers'

      - name: Upload MSDO results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}
          category: msdo

  container-image-scan:
    name: Build image and scan for CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_LOGIN_SERVER }}" -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build and push vulnerable image to ACR
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/cicd-vuln-app:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${{ secrets.ACR_LOGIN_SERVER }}/cicd-vuln-app:latest" .
          docker push "$IMAGE"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/cicd-vuln-app:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # Microsoft Defender for Cloud CLI (CI/CD integration) — scans the image the
      # pipeline pushed to ACR and reports it to Defender for Cloud. This creates
      # the "CI/CD pipeline -> pushes -> container image (with vulnerabilities)"
      # relationship in Cloud Security Explorer and feeds Attack path analysis.
      - name: Download Defender for Cloud CLI
        run: |
          curl -L -o defender "https://aka.ms/defender-cli_linux-x64" && chmod +x defender

      - name: Run Defender for Cloud CLI image scan (pushed ACR image)
        run: ./defender scan image "$IMAGE"
        continue-on-error: true
        env:
          DEFENDER_TENANT_ID: ${{ secrets.DEFENDER_CICD_TENANT_ID }}
          DEFENDER_CLIENT_ID: ${{ secrets.DEFENDER_CICD_CLIENT_ID }}
          DEFENDER_CLIENT_SECRET: ${{ secrets.DEFENDER_CICD_CLIENT_SECRET }}

      - name: Install Trivy and scan image (SARIF)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --format sarif --output trivy-image.sarif --severity CRITICAL,HIGH --ignore-unfixed=false "$IMAGE" || true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
