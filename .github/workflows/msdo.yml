name: Microsoft Security DevOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  msdo:
    name: MSDO scan (code, IaC, secrets, containers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1
        id: msdo
        with:
          categories: 'IaC,secrets,code,artifacts,containers'

      - name: Upload MSDO results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}
          category: msdo

  container-image-scan:
    name: Build image and scan for CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build vulnerable image
        run: docker build -t vulnerable-container-app:ci .

      # Microsoft Defender for Cloud CLI (CI/CD integration) — scans the image
      # built in the pipeline and publishes findings to Defender for Cloud so
      # they surface in Cloud Security Explorer and Attack path analysis.
      - name: Download Defender for Cloud CLI
        run: |
          curl -L -o defender "https://aka.ms/defender-cli_linux-x64" && chmod +x defender

      - name: Run Defender for Cloud CLI image scan
        run: ./defender scan image 'vulnerable-container-app:ci'
        continue-on-error: true
        env:
          DEFENDER_TENANT_ID: ${{ secrets.DEFENDER_CICD_TENANT_ID }}
          DEFENDER_CLIENT_ID: ${{ secrets.DEFENDER_CICD_CLIENT_ID }}
          DEFENDER_CLIENT_SECRET: ${{ secrets.DEFENDER_CICD_CLIENT_SECRET }}

      - name: Install Trivy and scan image (SARIF)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --format sarif --output trivy-image.sarif --severity CRITICAL,HIGH --ignore-unfixed=false vulnerable-container-app:ci || true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
