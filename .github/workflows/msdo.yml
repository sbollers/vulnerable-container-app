name: Microsoft Security DevOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  msdo:
    name: MSDO scan (code, IaC, secrets, containers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1
        id: msdo
        with:
          categories: 'IaC,secrets,code,artifacts,containers'

      - name: Upload MSDO results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}
          category: msdo

  container-image-scan:
    name: Build image and scan for CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build vulnerable image
        run: docker build -t vulnerable-container-app:ci .

      - name: Trivy image vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: vulnerable-container-app:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: false

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
